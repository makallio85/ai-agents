# docker-compose.yml â€” Coolify-ready stack for ai-agents.
#
# One compose file for dev + prod. BUILD_TARGET picks the Dockerfile stage:
#   BUILD_TARGET=dev   â†’ xdebug, dev composer deps
#   BUILD_TARGET=prod  â†’ no xdebug, --no-dev (compose default if unset)
# new-coolify-app.sh sets BUILD_TARGET per environment automatically.
#
# Required env vars (Coolify UI â†’ Environment Variables, mark passwords secret):
#   DB_PASSWORD, REDIS_PASSWORD, SECURITY_SALT
# Coolify auto-injects:
#   SERVICE_FQDN_NGINX, SERVICE_NAME_DB, SERVICE_NAME_REDIS, COOLIFY_RESOURCE_UUID
# Local dev (docker-compose.override.yml): bind-mounts source, exposes ports,
# forces BUILD_TARGET=dev. Coolify uses `-f docker-compose.yml` only, so the
# override is ignored on the server.

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: ${BUILD_TARGET:-prod}
    image: ${COOLIFY_RESOURCE_UUID:-ai-agents}-app:${BUILD_TARGET:-prod}
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-false}
      - SECURITY_SALT=${SECURITY_SALT}
      - DB_HOST=${SERVICE_NAME_DB:-db}
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-ai_agents}
      - DB_USERNAME=${DB_USERNAME:-ai_agents}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${SERVICE_NAME_REDIS:-redis}
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - QUEUE_DSN=redis://:${REDIS_PASSWORD}@${SERVICE_NAME_REDIS:-redis}:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    environment:
      - SERVICE_FQDN_NGINX=/
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  queue-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: ${BUILD_TARGET:-prod}
    image: ${COOLIFY_RESOURCE_UUID:-ai-agents}-app:${BUILD_TARGET:-prod}
    command: ["sh", "-c", "while true; do php /var/www/html/bin/cake.php queue worker --verbose || sleep 10; done"]
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-false}
      - SECURITY_SALT=${SECURITY_SALT}
      - DB_HOST=${SERVICE_NAME_DB:-db}
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-ai_agents}
      - DB_USERNAME=${DB_USERNAME:-ai_agents}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${SERVICE_NAME_REDIS:-redis}
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - QUEUE_DSN=redis://:${REDIS_PASSWORD}@${SERVICE_NAME_REDIS:-redis}:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: mariadb:11
    environment:
      - MARIADB_DATABASE=${DB_NAME:-ai_agents}
      - MARIADB_USER=${DB_USERNAME:-ai_agents}
      - MARIADB_PASSWORD=${DB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  db_data:
  redis_data:
