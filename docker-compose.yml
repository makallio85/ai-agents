version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: ai_agents_app
    volumes:
      - .:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/app.ini
    environment:
      - APP_ENV=development
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=ai_agents
      - DB_USERNAME=ai_agents
      - DB_PASSWORD=secret
      - DB_TEST_NAME=ai_agents_test
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_DSN=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ai_agents_network

  nginx:
    image: nginx:alpine
    container_name: ai_agents_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ai_agents_network

  db:
    image: mariadb:11
    container_name: ai_agents_db
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: ai_agents
      MYSQL_USER: ai_agents
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_agents_network

  redis:
    image: redis:7-alpine
    container_name: ai_agents_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - ai_agents_network

  queue-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: ai_agents_queue_worker
    command: php /var/www/html/bin/cake.php queue worker --verbose
    volumes:
      - .:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/app.ini
    environment:
      - APP_ENV=development
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=ai_agents
      - DB_USERNAME=ai_agents
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_DSN=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - ai_agents_network

volumes:
  db_data:
  redis_data:

networks:
  ai_agents_network:
    driver: bridge
