# docker-compose.yml — Coolify-ready stack for CakePHP 5 + Vue 3 + MariaDB + Redis.
#
# Each Coolify deployment (main dev branch + per-PR preview) gets its own
# complete, isolated stack. Branches cannot corrupt each other's data.
#
# Coolify auto-injects:
#   SERVICE_FQDN_APP     — public URL of this deployment
#   SERVICE_NAME_<NAME>  — suffixed service names so previews talk to siblings
#   COOLIFY_RESOURCE_UUID — unique-per-app build tag
#
# Required env vars (set in Coolify UI, mark passwords as secret):
#   DB_PASSWORD, REDIS_PASSWORD, SECURITY_SALT
# Optional with sensible defaults:
#   DB_NAME, DB_USER, CAKE_ENV, DEBUG

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ${COOLIFY_RESOURCE_UUID:-local}-app:latest
    environment:
      - SERVICE_FQDN_APP=/
      - CAKE_ENV=${CAKE_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - SECURITY_SALT=${SECURITY_SALT}
      - DB_HOST=${SERVICE_NAME_DB:-db}
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-app}
      - DB_USER=${DB_USER:-app}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${SERVICE_NAME_REDIS:-redis}
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RUN_MIGRATIONS=true
    expose:
      - "80"
    mem_limit: 512m
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      # Accept any 1xx/2xx/3xx/4xx — connect failure (000) must NOT count as healthy.
      test: ["CMD-SHELL", "curl -s -o /dev/null -w %{http_code} http://localhost/ | grep -qE '^[1-4][0-9][0-9]$$'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  worker:
    # Reuses the app image so we only build once.
    image: ${COOLIFY_RESOURCE_UUID:-local}-app:latest
    command: ["sh", "-c", "while true; do php bin/cake queue worker --quiet --verbose || sleep 10; done"]
    environment:
      - CAKE_ENV=${CAKE_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - SECURITY_SALT=${SECURITY_SALT}
      - DB_HOST=${SERVICE_NAME_DB:-db}
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-app}
      - DB_USER=${DB_USER:-app}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${SERVICE_NAME_REDIS:-redis}
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RUN_MIGRATIONS=false
    mem_limit: 256m
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: ${DB_NAME:-app}
      MARIADB_USER: ${DB_USER:-app}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -p${DB_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  db_data:
  redis_data:
