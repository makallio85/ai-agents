[PHP]
memory_limit = 256M
upload_max_filesize = 50M
post_max_size = 50M
max_execution_time = 300
date.timezone = UTC
display_errors = Off
log_errors = On
error_log = /var/log/php/error.log

; Use Redis for sessions so concurrent requests from the same browser
; do not race to UPDATE the same database row (MariaDB error 1020).
; phpredis handles locking atomically; no conflict possible.
session.save_handler = redis
session.save_path = "tcp://redis:6379"

[opcache]
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 2
