# nginx vhost — serves CakePHP + Vue-built assets behind Coolify's Traefik.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /var/www/html/webroot;
    index index.php;

    client_max_body_size 10M;
    client_body_timeout 60s;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Vite-built assets (webroot/build/) — hashed filenames, cache forever
    location /build/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static assets shipped with the repo
    location ~* \.(css|js|gif|jpe?g|png|webp|svg|woff2?|ttf|ico)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known) { deny all; }
    location ~* \.(env|json|lock|neon|xml|dist)$ { deny all; }
}
