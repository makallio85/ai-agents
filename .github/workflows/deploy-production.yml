name: Deploy production

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            # Bootstrap on first ever deploy: clone so deploy.sh is available
            if [ ! -d "/srv/apps/ai-agents/.git" ]; then
              git clone git@github.com:makallio85/ai-agents.git /srv/apps/ai-agents
            fi
            bash /srv/apps/ai-agents/deploy.sh
